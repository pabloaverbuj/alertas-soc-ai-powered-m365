<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; color: #1f2328; max-width: 820px; margin: 0 auto; padding: 24px; }
    .hdr { border-bottom: 3px solid #d83b01; padding-bottom: 8px; }
    .hdr h1 { margin: 0; font-size: 20px; color: #d83b01; }
    .meta { color: #6e7781; font-size: 12px; }
    h2 { font-size: 15px; margin-top: 24px; border-left: 4px solid #d83b01; padding-left: 8px; }
    pre { white-space: pre-wrap; font-family: inherit; background: #f6f8fa; padding: 12px; border-radius: 6px; }
    .footer { margin-top: 32px; color: #6e7781; font-size: 11px; border-top: 1px solid #d0d7de; padding-top: 8px; }
  </style>
</head>
<body>
  <div class="hdr">
    <h1>{{TITLE}}</h1>
    <div class="meta">{{ORGANIZATION}} · Generado: {{GENERATED}} · Sentinel: {{WORKSPACE}}</div>
  </div>
  {{BODY}}
  <div class="footer">SOC AI · automatizado vía Azure Automation (Managed Identity). No responder a este correo.</div>
</body>
</html>
